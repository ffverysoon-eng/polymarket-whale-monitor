<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Whale Monitor — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0f14;
      color: #e2e8f0;
      font-family: system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #161a24;
      border: 1px solid #252b3b;
      border-radius: 12px;
      padding: 40px 36px;
      width: 100%;
      max-width: 360px;
    }
    .logo {
      font-size: 22px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 6px;
    }
    .logo span { color: #6366f1; }
    .subtitle {
      text-align: center;
      color: #64748b;
      font-size: 13px;
      margin-bottom: 32px;
    }
    label {
      display: block;
      font-size: 12px;
      color: #64748b;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: .6px;
    }
    input[type="password"] {
      width: 100%;
      padding: 10px 14px;
      background: #0d0f14;
      border: 1px solid #252b3b;
      border-radius: 7px;
      color: #e2e8f0;
      font-size: 14px;
      outline: none;
      transition: border-color .15s;
    }
    input[type="password"]:focus { border-color: #6366f1; }
    .error {
      background: rgba(239,68,68,.1);
      border: 1px solid rgba(239,68,68,.3);
      color: #f87171;
      border-radius: 6px;
      padding: 9px 12px;
      font-size: 13px;
      margin-bottom: 16px;
    }
    button {
      width: 100%;
      margin-top: 18px;
      padding: 11px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }
    button:hover { opacity: .85; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🐳 Polymarket <span>Whale Monitor</span></div>
    <div class="subtitle">Private dashboard — enter your password</div>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
      <label for="password">Password</label>
      <input type="password" id="password" name="password"
             placeholder="••••••••••" autofocus autocomplete="current-password" />
      <button type="submit">Sign In →</button>
    </form>
  </div>
</body>
</html>
